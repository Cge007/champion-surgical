<svg width="360" height="410" viewBox="0 0 180 205" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="face" x1="30" y1="6" x2="150" y2="130" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2a5090"/>
      <stop offset="55%" stop-color="#162d56"/>
      <stop offset="100%" stop-color="#060e1c"/>
    </linearGradient>
    <linearGradient id="lbevel" x1="10" y1="100" x2="30" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6a9ed8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1a3060" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rbevel" x1="150" y1="100" x2="170" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#020508" stop-opacity="0"/>
      <stop offset="100%" stop-color="#010205" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="shine" x1="15" y1="8" x2="120" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="50%" stop-color="#aad0f0" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="rim" x1="0" y1="0" x2="180" y2="205" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#d8eeff"/>
      <stop offset="25%" stop-color="#80c0ec"/>
      <stop offset="65%" stop-color="#2a5090"/>
      <stop offset="100%" stop-color="#080f1e"/>
    </linearGradient>
    <linearGradient id="cross" x1="90" y1="20" x2="90" y2="188" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f0faff"/>
      <stop offset="35%" stop-color="#98d0fa"/>
      <stop offset="100%" stop-color="#2868cc"/>
    </linearGradient>
    <linearGradient id="crosslit" x1="76" y1="94" x2="92" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.38"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="crosstop" x1="90" y1="78" x2="90" y2="93" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-15%" width="150%" height="145%">
      <feDropShadow dx="4" dy="8" stdDeviation="8" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
    <filter id="crossglow" x="-35%" y="-10%" width="170%" height="120%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="ambglow" x="-25%" y="-20%" width="150%" height="150%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip">
      <path d="M90 6 L170 37 L170 112 Q170 167 90 194 Q10 167 10 112 L10 37 Z"/>
    </clipPath>
  </defs>

  <!-- Ambient glow -->
  <path d="M90 6 L170 37 L170 112 Q170 167 90 194 Q10 167 10 112 L10 37 Z"
    fill="rgba(60,110,200,0.18)" filter="url(#ambglow)"/>

  <!-- Drop shadow -->
  <path d="M90 6 L170 37 L170 112 Q170 167 90 194 Q10 167 10 112 L10 37 Z"
    fill="#000" opacity="0.45" filter="url(#shadow)" transform="translate(4,8)"/>

  <!-- Shield body -->
  <path d="M90 6 L170 37 L170 112 Q170 167 90 194 Q10 167 10 112 L10 37 Z" fill="url(#face)"/>

  <!-- Left bevel -->
  <path d="M90 6 L10 37 L10 112 Q10 167 90 194 Q10 167 10 112 L10 37 Z"
    fill="url(#lbevel)" clip-path="url(#clip)"/>

  <!-- Right bevel -->
  <path d="M170 37 L170 112 Q170 167 90 194 Q160 170 170 112 L170 37 Z"
    fill="url(#rbevel)" clip-path="url(#clip)"/>

  <!-- Top shine -->
  <path d="M90 6 L170 37 L155 75 Q130 55 90 53 Q50 55 25 75 L10 37 Z" fill="url(#shine)"/>

  <!-- Rim -->
  <path d="M90 6 L170 37 L170 112 Q170 167 90 194 Q10 167 10 112 L10 37 Z"
    fill="none" stroke="url(#rim)" stroke-width="2.8"/>

  <!-- Inner inset -->
  <path d="M90 13 L163 42 L163 112 Q163 160 90 185 Q17 160 17 112 L17 42 Z"
    fill="none" stroke="rgba(160,200,240,0.15)" stroke-width="1.5"/>

  <!-- Cross vertical -->
  <rect x="76" y="22" width="28" height="160" rx="6" fill="url(#cross)" filter="url(#crossglow)"/>
  <!-- Cross horizontal -->
  <rect x="26" y="78" width="128" height="30" rx="6" fill="url(#cross)" filter="url(#crossglow)"/>

  <!-- Cross lit bevels -->
  <rect x="76" y="22" width="14" height="160" rx="6" fill="url(#crosslit)"/>
  <rect x="26" y="78" width="128" height="14" rx="6" fill="url(#crosstop)"/>

  <!-- Center glint -->
  <ellipse cx="90" cy="93" rx="12" ry="12" fill="rgba(255,255,255,0.2)"/>
</svg>
